# ===================================================================
# Spring Boot Configuration
# ===================================================================
spring:
  application:
    name: portfolioplanner

server:
  port: 8080

# ===================================================================
# Portfolio Planner Default Simulation Settings
# ===================================================================
simulation:
  defaults:
    current-age: 34
    retirement-age: 60
    initial-net-worth: 1500000.00
    monthly-salary: 8500.00
    monthly-expenses: 3500.00
    allocation:
      equity-percentage: 39.0
      bond-percentage: 40.0
      cash-percentage: 21.0
      equity-yield-percent: 7.0
      bond-yield-percent: 2.0
      cash-yield-percent: 2.5
    abgeltungsteuer-percent: 26.375
    sparerpauschbetrag: 1000.00
    basiszins-percent: 2.29
    bond-quarterly-withdrawal: 10000.00
    dca-monthly-amount: 6000.00
    target-equity-ratio-percent: 80.0
    post-target-strategy: PROPORTIONAL_REBALANCE
