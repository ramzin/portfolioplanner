<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Premium Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Theme Gradients -->
    <linearGradient id="cashGrad" x1="0" y1="512" x2="512" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="bondGrad" x1="0" y1="512" x2="512" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <linearGradient id="equityGrad" x1="0" y1="512" x2="512" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="trendGrad" x1="0" y1="512" x2="512" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
  </defs>

  <!-- Cohesive Dark Base Circle -->
  <circle cx="256" cy="256" r="240" fill="#08090d" stroke="rgba(255, 255, 255, 0.08)" stroke-width="8" />

  <!-- Concentric Rings (Asset Allocation) -->
  <g filter="url(#glow)">
    <!-- Equity Ring (Outer) -->
    <circle cx="256" cy="256" r="160" stroke="url(#equityGrad)" stroke-width="28" stroke-linecap="round" stroke-dasharray="750 1006" stroke-dashoffset="150" fill="none" />
    
    <!-- Bond Ring (Middle) -->
    <circle cx="256" cy="256" r="110" stroke="url(#bondGrad)" stroke-width="24" stroke-linecap="round" stroke-dasharray="510 692" stroke-dashoffset="300" fill="none" />
    
    <!-- Cash Ring (Inner) -->
    <circle cx="256" cy="256" r="60" stroke="url(#cashGrad)" stroke-width="20" stroke-linecap="round" stroke-dasharray="280 378" stroke-dashoffset="50" fill="none" />
  </g>

  <!-- Trend Line & Arrow (Wealth Accumulation & Transition) -->
  <g filter="url(#glow)">
    <path d="M 120 392 L 392 120" stroke="url(#trendGrad)" stroke-width="14" stroke-linecap="round" />
    <path d="M 326 120 L 392 120 L 392 186" stroke="url(#trendGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" stroke-linecap="round" />
  </g>
</svg>